$kind: http-request
description: "Expected: 201。Test 脚本自动把邮箱和 _id 存进 seedUserAEmail / seedUserAId,给下面几条 409/清理用。"
url: "{{baseUrl}}/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Seed User A",
      "email": "seed-a-{{$timestamp}}@example.com",
      "age": 30
    }
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json();
      pm.collectionVariables.set('seedUserAEmail', data.email);
      pm.collectionVariables.set('seedUserAId', data._id);
    language: text/javascript
order: 1000
