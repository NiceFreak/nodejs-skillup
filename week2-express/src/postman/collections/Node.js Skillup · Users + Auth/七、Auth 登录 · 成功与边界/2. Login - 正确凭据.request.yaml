$kind: http-request
description: "Expected: 200。依赖第 1 条保存的 loginDemoEmail。验证 v2 响应、JWT 签发与安全用户摘要，并把 memberAccessToken 保存为 collection variable。"
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{loginDemoEmail}}",
      "password": "correct horse battery staple"
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('status is 200', () => pm.response.to.have.status(200));
      pm.test('v2 envelope is valid', () => {
        pm.expect(body.code).to.eql(200);
        pm.expect(body.message).to.eql('登录成功');
        pm.expect(body.payload).to.be.an('object');
      });
      pm.test('access token is returned', () => {
        pm.expect(body.payload.accessToken).to.be.a('string').and.not.empty;
      });
      pm.test('user has only safe summary fields', () => {
        pm.expect(body.payload.user).to.have.all.keys('userId', 'name', 'email');
        pm.expect(body.payload.user).to.not.have.property('password');
        pm.expect(body.payload.user).to.not.have.property('passwordHash');
      });
      pm.collectionVariables.set('memberAccessToken', body.payload.accessToken);
      pm.collectionVariables.set('accessToken', body.payload.accessToken);
    language: text/javascript
order: 2000
