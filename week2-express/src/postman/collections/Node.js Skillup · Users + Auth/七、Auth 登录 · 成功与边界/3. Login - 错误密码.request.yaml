$kind: http-request
description: "Expected: 401 Invalid email or password。正确邮箱 + 错误密码，与「邮箱不存在」使用同一文案，防止枚举注册邮箱。"
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{loginDemoEmail}}",
      "password": "definitely the wrong password"
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('status is 401', () => pm.response.to.have.status(401));
      pm.test('unified 401 message', () => pm.expect(body.error).to.eql('Invalid email or password'));
    language: text/javascript
order: 3000
