$kind: http-request
description: "Expected: 400 Request body is missing。不带任何请求体，由 validateHasRequestBody 拦截，不进入凭据校验。"
url: "{{baseUrl}}/auth/login"
method: POST
scripts:
  - type: afterResponse
    code: pm.test('status is 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 8000
