$kind: http-request
description: "Expected: 201。走普通 POST /users 创建一个没有 passwordHash 的历史用户；Test 把邮箱和 _id 存进 legacyUserEmail / legacyUserId，给第 6 条和清理用。"
url: "{{baseUrl}}/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Legacy User",
      "email": "legacy-{{$timestamp}}@example.com",
      "age": 42
    }
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json();
      pm.collectionVariables.set('legacyUserEmail', data.email);
      pm.collectionVariables.set('legacyUserId', data._id);
    language: text/javascript
order: 5000
