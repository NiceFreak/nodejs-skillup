$kind: http-request
description: "Expected: 400。验证 auth service 的最低 15 位密码策略。"
url: "{{baseUrl}}/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Weak Password User",
      "email": "weak-{{$randomUUID}}@example.com",
      "password": "123456"
    }
scripts:
  - type: afterResponse
    code: pm.test('status is 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 5000
