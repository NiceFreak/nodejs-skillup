$kind: http-request
description: "Expected: 400。days 必须是正整数。"
url: "{{baseUrl}}/reports/customer-spending?status=completed&days=0"
method: GET
queryParams:
  status: completed
  days: "0"
scripts:
  - type: afterResponse
    code: pm.test('status is 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 3000
