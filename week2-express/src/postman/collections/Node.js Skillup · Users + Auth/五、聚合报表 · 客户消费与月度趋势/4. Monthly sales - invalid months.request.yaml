$kind: http-request
description: "Expected: 400。使用 adminAccessToken 通过授权后，months 必须是正整数。"
url: "{{baseUrl}}/reports/monthly-sales?status=completed&months=0"
method: GET
headers:
  Authorization: Bearer {{adminAccessToken}}
queryParams:
  status: completed
  months: "0"
scripts:
  - type: afterResponse
    code: pm.test('status is 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 4000
